<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Psicología</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <span class="logo-icon">🧠</span>
                <h1>PsicoApp</h1>
            </div>
            <div class="user-profile">
                <div class="avatar">Dr</div>
                <span>Dr. Admin</span>
            </div>
        </header>

        <!-- Main Content Grid -->
        <main class="main-layout">
            <!-- Left Panel: Calendar -->
            <section class="panel calendar-panel">
                <div class="panel-header">
                    <h2>Calendario de Turnos</h2>
                    <div class="calendar-controls">
                        <button id="prev-month" class="icon-btn">&lt;</button>
                        <h3 id="current-month">Octubre 2023</h3>
                        <button id="next-month" class="icon-btn">&gt;</button>
                    </div>
                </div>
                
                <div class="calendar">
                    <div class="weekdays">
                        <div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div><div>Dom</div>
                    </div>
                    <div class="days" id="calendar-days">
                        <!-- Days will be generated by JS -->
                    </div>
                </div>
            </section>

            <!-- Right Panel: Appointments -->
            <section class="panel appointments-panel">
                <div class="panel-header">
                    <h2>Turnos del Día</h2>
                    <p id="selected-date-text" class="subtitle">Selecciona un día</p>
					<button id="print-day-btn" class="secondary-btn" style="width: 100%; margin-bottom: 1rem; justify-content: center; gap: 8px;">
					🖨️ Imprimir Listado del Día
					</button>
                </div>

                <div class="appointments-list" id="appointments-list">
                    <!-- Appointments will be rendered here -->
                    <div class="empty-state">
                        <p>No hay turnos para este día.</p>
                    </div>
                </div>

                <!-- Botones de Acción Múltiple -->
                <div style="display: flex; flex-direction: column; gap: 0.75rem; margin-top: auto;">
                    <button class="secondary-btn" id="new-appointment-btn" style="width: 100%; border-color: var(--accent-primary); color: var(--text-primary); font-weight: 600;">
                        ⏰ Agendar Turno para este día
                    </button>
                    <button class="primary-btn" id="new-patient-btn">
                        ➕ Registrar Nuevo Paciente
                    </button>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal Nuevo Paciente -->
    <div id="patient-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Nuevo Paciente</h2>
                <button id="close-modal-btn" class="icon-btn">&times;</button>
            </div>
            <form id="new-patient-form">
                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" name="nombre" required placeholder="Ej. Juan Pérez">
                </div>
                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="text" id="telefono" name="telefono" required placeholder="Ej. 11-1234-5678">
                </div>
                <div class="form-group">
                    <label for="fecha_nacimiento">Fecha de Nacimiento</label>
                    <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" required>
                </div>
                <div class="form-group">
                    <label for="fecha_inicio">Fecha de Inicio de Tratamiento</label>
                    <input type="date" id="fecha_inicio" name="fecha_inicio" required>
                </div>
                <div class="modal-actions">
                    <button type="button" id="cancel-patient-btn" class="secondary-btn">Cancelar</button>
                    <button type="submit" class="primary-btn">Guardar Paciente</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Agendar Turno -->
    <div id="appointment-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Agendar Turno</h2>
                <button id="close-appt-modal-btn" class="icon-btn">&times;</button>
            </div>
            <form id="new-appointment-form">
                <div class="form-group">
    <label for="paciente_buscar">Paciente</label>
    <div style="display: flex; gap: 0.5rem; align-items: center;">
        <input type="text" id="paciente_buscar" list="lista-pacientes-pred" placeholder="Escribe para buscar..." required style="flex: 1;">
        <datalist id="lista-pacientes-pred">
            </datalist>
        
        <input type="hidden" id="paciente_id_real" name="paciente_id">

        <button type="button" id="fast-new-patient-btn" class="secondary-btn" title="Registrar nuevo paciente rápido" style="padding: 0.75rem; font-size: 1.1rem; line-height: 1;">
            ➕
        </button>
    </div>
</div>
                <div class="form-group">
                    <label for="hora">Hora</label>
                    <input type="time" id="hora" name="hora" required>
                </div>
                <div class="form-group">
                    <label for="motivo">Motivo de la sesión</label>
                    <input type="text" id="motivo" name="motivo" required placeholder="Ej. Terapia inicial">
                </div>
                <div class="modal-actions">
                    <button type="button" id="cancel-appt-btn" class="secondary-btn">Cancelar</button>
                    <button type="submit" class="primary-btn">Guardar Turno</button>
                </div>
            </form>
        </div>
    </div>
<div id="patients-list-modal" class="modal-overlay hidden">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h2>Directorio de Pacientes</h2>
                <button id="close-patients-list-btn" class="icon-btn">&times;</button>
            </div>
            <div class="form-group">
                <input type="text" id="search-patient-input" placeholder="🔍 Buscar paciente por nombre o teléfono...">
            </div>
            <div id="patients-directory-container" style="max-height: 400px; overflow-y: auto; margin-top: 1rem;">
                </div>
        </div>
    </div>

    <div id="patient-profile-modal" class="modal-overlay hidden">
        <div class="modal-content" style="max-width: 650px;">
            <div class="modal-header" style="border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
                <div>
                    <h2 id="profile-name">Nombre del Paciente</h2>
                    <p id="profile-meta" style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 4px;"></p>
                </div>
                <button id="close-profile-btn" class="icon-btn">&times;</button>
            </div>
            <div style="margin-top: 1.5rem;">
                <h3 style="font-size: 1.1rem; margin-bottom: 1rem; color: var(--accent-primary);">📜 Historial Clínico y Sesiones</h3>
                <div id="profile-history-container" style="max-height: 350px; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem;">
                    </div>
            </div>
        </div>
    </div>
    <!-- Importamos Supabase  -->
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.8/dist/umd/supabase.js"></script>
	
    <script src="app.js"></script>
</body>
</html>
